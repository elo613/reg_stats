<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiology Analytics - Refactored</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
    
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --accent-blue: #0056b3;
            --accent-green: #198754;
            --accent-purple: #6f42c1;
            --total-yellow: #fefae0;
            --total-col-blue: #e1f5fe;
            --border-color: #dee2e6;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--primary-bg);
            margin: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        #upload-zone {
            padding: 40px;
            border: 2px dashed #007bff;
            text-align: center;
            margin-bottom: 30px;
            background: #f0f7ff;
            border-radius: 8px;
        }

        .file-inputs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }

        .file-box {
            background: white;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            width: 200px;
        }

        button {
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        #processBtn { background: #007bff; color: white; }
        #processBtn:hover { background: #0056b3; transform: translateY(-1px); }

        .tabs-header {
            display: flex;
            gap: 4px;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 25px;
        }

        .tab-btn {
            padding: 12px 20px;
            background: #e9ecef;
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            color: #666;
        }

        .tab-btn.active {
            background: white;
            border-bottom: 2px solid white;
            margin-bottom: -2px;
            color: var(--accent-blue);
            font-weight: bold;
        }

        .search-container {
            background: #f1f3f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="text"] {
            padding: 10px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .table-wrapper { 
            overflow: auto; 
            max-height: 500px; 
            margin-bottom: 30px; 
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: center;
        }

        th { background: #f8f9fa; position: sticky; top: 0; z-index: 10; font-weight: 600; }
        
        tr.total-row { background-color: var(--total-yellow); font-weight: bold; }
        td.total-col { background-color: var(--total-col-blue); font-weight: bold; }
        
        .section-title { border-left: 5px solid var(--accent-blue); padding-left: 15px; margin: 40px 0 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="upload-zone">
        <h1>Radiology Analytics Dashboard</h1>
        <p>Upload CSV exports to generate registrar performance metrics.</p>
        <div class="file-inputs">
            <div class="file-box"><label><strong>Primary CSV (R1)</strong></label><input type="file" id="csvPicker1" accept=".csv"></div>
            <div class="file-box"><label><strong>Secondary CSV (R2)</strong></label><input type="file" id="csvPicker2" accept=".csv"></div>
        </div>
        <button id="processBtn">Process Analytics</button>
    </div>

    <div id="main-ui" class="hidden">
        <div class="tabs-header">
            <button class="tab-btn active" onclick="showTab('summary-view', this)">XR Stats Summary</button>
            <button class="tab-btn" onclick="showTab('search-view', this)">Registrar Search</button>
        </div>

        <div id="summary-view" class="tab-content">
            <h2 class="section-title">1. Monthly Total Reported (Modality 'R')</h2>
            <div id="out-combined-reported" class="table-wrapper"></div>

            <h2 class="section-title" style="border-color: var(--accent-green);">2. Monthly Total Verified (Modality 'R')</h2>
            <div id="out-verif-monthly" class="table-wrapper"></div>

            <h2 class="section-title" style="border-color: var(--accent-purple);" id="title-7day">3. Prior 7-Day Total Activity</h2>
            <div id="out-verif-7day" class="table-wrapper"></div>
        </div>

        <div id="search-view" class="tab-content hidden">
            <div class="search-container">
                <label><strong>Reporter ID:</strong></label>
                <input type="text" id="searchID" placeholder="Enter ID (e.g. 7659567)">
                <button id="searchBtn" style="background: var(--accent-purple); color: white;">Search Results</button>
            </div>
            <div id="search-results-area" class="hidden">
                <h2 class="section-title" style="border-color: var(--accent-purple);">
                    Results for: <span id="registrar-display-name" style="color: var(--accent-purple);"></span>
                </h2>
                <div id="search-tables-container"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const DateTime = luxon.DateTime;
    const NAME_MAP = {
        "7659567": "E.L", "7668654": "S.R", "7727570": "S.H",
        "7842120": "Q.O", "7785803": "M.M", "7848633": "K.A",
        "7846731": "A.O", "7461820": "C.M", "7750701": "S.A",
        "C7563004": "A.K"
    };
    const ORDERED_NAMES = ["E.L", "S.R", "S.H", "A.K", "Q.O", "M.M", "K.A", "A.O", "C.M", "S.A"];

    let globalProcessedData = [];
    let globalMonths = [];

    // --- Helper Functions ---
    const getIDsForName = (name) => Object.keys(NAME_MAP).filter(id => NAME_MAP[id] === name);
    
    const parseFile = (file) => new Promise(res => {
        Papa.parse(file, { header: true, skipEmptyLines: true, complete: r => res(r.data) });
    });

    // --- Core Logic ---
    document.getElementById('processBtn').addEventListener('click', async () => {
        const f1 = document.getElementById('csvPicker1').files[0];
        const f2 = document.getElementById('csvPicker2').files[0];
        if (!f1 || !f2) return alert("Please select both CSV files.");

        const [d1, d2] = await Promise.all([parseFile(f1), parseFile(f2)]);
        const combined = Array.from(new Map([...d1, ...d2].map(item => [item.Accession?.trim(), item])).values())
            .filter(item => item.Accession);

        processData(combined);
    });

    function processData(rawData) {
        globalProcessedData = rawData.map(row => {
            const dt = DateTime.fromFormat(row['Verify Date'], 'd/M/yyyy');
            return {
                ...row,
                dt,
                monthYear: dt.isValid ? dt.toFormat('MMMM yyyy') : null,
                sortKey: dt.isValid ? dt.toFormat('yyyyMM') : '0',
                rep1ID: String(row['Reported by'] || '').trim(),
                rep2ID: String(row['Reported by2'] || '').trim(),
                verifID: String(row['Verif By'] || '').trim(),
                typedID: String(row['Typed by'] || '').trim()
            };
        }).filter(d => d.monthYear && d['Modality'] !== 'Z');

        globalMonths = [...new Set(globalProcessedData.map(d => d.monthYear))].sort((a, b) => 
            globalProcessedData.find(d => d.monthYear === a).sortKey - globalProcessedData.find(d => d.monthYear === b).sortKey
        );

        renderSummaries();
        document.getElementById('main-ui').classList.remove('hidden');
        document.getElementById('upload-zone').classList.add('hidden');
    }

    function renderSummaries() {
        const xrays = globalProcessedData.filter(d => d['Modality'] === 'R');
        
        // 1. Monthly Reported
        const repRows = ORDERED_NAMES.map(name => {
            const ids = getIDsForName(name);
            return [name, ...globalMonths.map(m => 
                xrays.filter(d => (ids.includes(d.rep1ID) || ids.includes(d.rep2ID)) && d.monthYear === m).length
            )];
        });
        renderTable('out-combined-reported', ['Registrar', ...globalMonths], repRows);

        // 2. Monthly Verified
        const verifRows = ORDERED_NAMES.map(name => {
            const ids = getIDsForName(name);
            return [name, ...globalMonths.map(m => 
                xrays.filter(d => ids.includes(d.verifID) && d.monthYear === m).length
            )];
        });
        renderTable('out-verif-monthly', ['Registrar', ...globalMonths], verifRows);

        // 3. 7-Day Activity (Verifier OR Reporter 1/2 OR Typer)
        const maxDate = DateTime.max(...globalProcessedData.map(d => d.dt));
        const cutoff = maxDate.minus({ days: 7 });
        document.getElementById('title-7day').innerText = `3. Prior 7-Day Activity (to ${maxDate.toFormat('dd/MM/yyyy')})`;
        
        const s7Rows = ORDERED_NAMES.map(name => {
            const ids = getIDsForName(name);
            const totalActivity = xrays.filter(d => 
                d.dt > cutoff && (
                    ids.includes(d.verifID) || 
                    ids.includes(d.rep1ID) || 
                    ids.includes(d.rep2ID) || 
                    ids.includes(d.typedID)
                )
            ).length;
            return [name, totalActivity];
        });
        renderTable('out-verif-7day', ['Registrar', 'Total X-ray Involvement'], s7Rows, false);
    }

    // --- Table Renderer ---
    function renderTable(target, headers, rows, hasRowTotal = true) {
        const container = (typeof target === 'string') ? document.getElementById(target) : target;
        const colTotals = new Array(headers.length).fill(0);

        let html = `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}`;
        if (hasRowTotal) html += `<th class="total-col">TOTAL</th>`;
        html += `</tr></thead><tbody>`;

        rows.forEach(r => {
            let rowSum = 0;
            html += `<tr>${r.map((c, i) => {
                if (i > 0) { 
                    colTotals[i] += (Number(c) || 0); 
                    rowSum += (Number(c) || 0); 
                }
                return `<td>${c}</td>`;
            }).join('')}`;
            if (hasRowTotal) html += `<td class="total-col">${rowSum}</td>`;
            html += `</tr>`;
        });

        html += `<tr class="total-row"><td>GRAND TOTAL</td>${colTotals.slice(1).map(v => `<td>${v}</td>`).join('')}`;
        if (hasRowTotal) html += `<td></td>`;
        html += `</tr></tbody></table>`;
        container.innerHTML = html;
    }

    // --- Search Logic ---
    document.getElementById('searchBtn').addEventListener('click', () => {
        const id = document.getElementById('searchID').value.trim();
        if (!id) return;

        const name = NAME_MAP[id] || "Unknown Registrar";
        document.getElementById('registrar-display-name').innerText = `${name} (ID: ${id})`;
        const container = document.getElementById('search-tables-container');
        container.innerHTML = '';
        document.getElementById('search-results-area').classList.remove('hidden');

        const subsets = [
            { title: "Primary Reports (Reported By)", data: globalProcessedData.filter(d => d.rep1ID === id) },
            { title: "Secondary Reports (Reported By 2)", data: globalProcessedData.filter(d => d.rep2ID === id) }
        ];

        subsets.forEach(s => {
            const h3 = document.createElement('h3');
            h3.className = 'section-title';
            h3.innerText = s.title;
            container.appendChild(h3);

            const wrap = document.createElement('div');
            wrap.className = 'table-wrapper';
            container.appendChild(wrap);

            if (s.data.length === 0) {
                wrap.innerHTML = "<p style='padding:20px'>No data found for this ID.</p>";
                return;
            }

            const mods = [...new Set(globalProcessedData.map(d => d['Modality']))].sort();
            const modRows = globalMonths.map(m => [m, ...mods.map(mod => 
                s.data.filter(d => d.monthYear === m && d['Modality'] === mod).length
            )]);
            renderTable(wrap, ['Month', ...mods], modRows);
        });
    });

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        el.classList.add('active');
    }
</script>

</body>
</html>
