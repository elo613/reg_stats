<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiology Analytics - Dual Source</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
    
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --accent-blue: #0056b3;
            --accent-green: #198754;
            --accent-purple: #6f42c1;
            --total-yellow: #fefae0;
            --total-col-blue: #e1f5fe;
        }

        body {
            font-family: 'Segoe UI', 'Calibri', sans-serif;
            background-color: var(--primary-bg);
            margin: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #upload-zone {
            padding: 30px;
            border: 2px dashed #007bff;
            text-align: center;
            margin-bottom: 30px;
            background: #f0f7ff;
            border-radius: 8px;
        }

        .file-inputs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .file-box {
            background: white;
            padding: 15px;
            border: 1px solid #ced4da;
            border-radius: 6px;
        }

        button#processBtn {
            padding: 12px 30px;
            font-size: 1.1em;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button#processBtn:hover { background: #0056b3; }

        /* Tabs */
        .tabs-header {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            border-bottom: 2px solid #dee2e6;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 18px;
            cursor: pointer;
            background: #e9ecef;
            border: 1px solid #dee2e6;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            font-weight: 500;
        }
        .tab-btn.active {
            background: white;
            border-bottom: 2px solid white;
            margin-bottom: -2px;
            color: var(--accent-blue);
            font-weight: bold;
        }

        /* Tables */
        .table-wrapper { 
            overflow-x: auto; 
            max-height: 400px; 
            overflow-y: auto; 
            margin-bottom: 30px; 
            border: 1px solid #dee2e6;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 10px;
            text-align: center;
            min-width: 80px;
        }
        th { background: #f1f3f5; position: sticky; top: 0; z-index: 10; }
        
        /* Highlighting */
        tr.total-row { background-color: var(--total-yellow) !important; font-weight: bold; }
        td.total-col { background-color: var(--total-col-blue); font-weight: bold; }
        
        .section-title { border-left: 5px solid #0056b3; padding-left: 15px; margin-top: 30px; margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="upload-zone">
        <h2>Radiology Analytics Dashboard</h2>
        <div class="file-inputs">
            <div class="file-box">
                <label><strong>Select R1.csv:</strong></label><br><br>
                <input type="file" id="csvPicker1" accept=".csv">
            </div>
            <div class="file-box">
                <label><strong>Select R2.csv:</strong></label><br><br>
                <input type="file" id="csvPicker2" accept=".csv">
            </div>
        </div>
        <button id="processBtn">Process Analytics</button>
    </div>

    <div id="main-ui" class="hidden">
        <div class="tabs-header" id="tabContainer">
            <div class="tab-btn active" onclick="showTab('summary-view', this)">XR Stats Summary</div>
        </div>

        <div id="summary-view" class="tab-content">
            <h2 class="section-title">1. Monthly Total Reported (Rep 1 + Rep 2) - Modality 'R'</h2>
            <div id="out-combined-reported" class="table-wrapper"></div>

            <h2 class="section-title" style="border-color: var(--accent-green); color: var(--accent-green);">2. Monthly Total Verified - Modality 'R'</h2>
            <div id="out-verif-monthly" class="table-wrapper"></div>

            <h2 class="section-title" style="border-color: var(--accent-blue); color: var(--accent-blue);" id="title-7day">3. Prior 7-Day Running Total</h2>
            <div id="out-verif-7day" class="table-wrapper"></div>
        </div>

        <div id="individual-view-container"></div>
    </div>
</div>

<script>
    const NAME_MAP = {
        "7659567": "E.L", "7668654": "S.R", "7727570": "S.H",
        "7842120": "Q.O", "7785803": "M.M", "7848633": "K.A",
        "7846731": "A.O", "7461820": "C.M", "7750701": "S.A"
    };
    
    const ORDERED_NAMES = ["E.L", "S.R", "S.H", "Q.O", "M.M", "K.A", "A.O", "C.M", "S.A"];
    const DateTime = luxon.DateTime;

    document.getElementById('processBtn').addEventListener('click', async function() {
        const file1 = document.getElementById('csvPicker1').files[0];
        const file2 = document.getElementById('csvPicker2').files[0];

        if (!file1 || !file2) {
            alert("Please select both R1 and R2 CSV files.");
            return;
        }

        const data1 = await parseFile(file1);
        const data2 = await parseFile(file2);
        
        // Merge and De-duplicate by Accession
        let combinedData = [...data1, ...data2];
        const seenAccessions = new Set();
        combinedData = combinedData.filter(item => {
            const acc = item.Accession?.trim();
            if (!acc || seenAccessions.has(acc)) return false;
            seenAccessions.add(acc);
            return true;
        });

        processAnalytics(combinedData);
    });

    function parseFile(file) {
        return new Promise((resolve) => {
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: (results) => resolve(results.data)
            });
        });
    }

    function processAnalytics(rawData) {
        const data = rawData.map(row => {
            const dt = DateTime.fromFormat(row['Verify Date'], 'd/M/yyyy');
            return {
                ...row,
                dt: dt,
                monthYear: dt.isValid ? dt.toFormat('MMMM yyyy') : null,
                sortKey: dt.isValid ? dt.toFormat('yyyyMM') : '0',
                rep1Name: NAME_MAP[String(row['Reported by']).trim()],
                rep2Name: NAME_MAP[String(row['Reported by2']).trim()],
                verifName: NAME_MAP[String(row['Verif By']).trim()]
            };
        }).filter(d => d.monthYear && d['Modality'] !== 'Z');

        const months = [...new Set(data.map(d => d.monthYear))].sort((a, b) => 
            data.find(d => d.monthYear === a).sortKey - data.find(d => d.monthYear === b).sortKey
        );

        // 1. Summary: Monthly Reported Modality 'R'
        const rData = data.filter(d => d['Modality'] === 'R');
        const summaryRepRows = ORDERED_NAMES.map(name => {
            const row = [name];
            months.forEach(m => {
                const count = rData.filter(d => (d.rep1Name === name || d.rep2Name === name) && d.monthYear === m).length;
                row.push(count);
            });
            return row;
        });
        renderTable('out-combined-reported', ['Registrar', ...months], summaryRepRows);

        // 2. Summary: Monthly Verified Modality 'R'
        const summaryVerifRows = ORDERED_NAMES.map(name => {
            const row = [name];
            months.forEach(m => {
                const count = rData.filter(d => d.verifName === name && d.monthYear === m).length;
                row.push(count);
            });
            return row;
        });
        renderTable('out-verif-monthly', ['Registrar', ...months], summaryVerifRows);

        // 3. Summary: 7-Day Running
        const maxDate = DateTime.max(...data.map(d => d.dt));
        const cutoff = maxDate.minus({ days: 7 });
        document.getElementById('title-7day').innerText = `3. Prior 7-Day Running Total (Verified 'R' to ${maxDate.toFormat('dd/MM')})`;
        const summary7DayRows = ORDERED_NAMES.map(name => {
            const count = rData.filter(d => d.verifName === name && d.dt > cutoff).length;
            return [name, count];
        });
        renderTable('out-verif-7day', ['Registrar', 'Count'], summary7DayRows);

        setupIndividualTabs(data);
        document.getElementById('main-ui').classList.remove('hidden');
        document.getElementById('upload-zone').style.display = 'none';
    }

    function renderTable(containerId, headers, rows) {
        const container = (typeof containerId === 'string') ? document.getElementById(containerId) : containerId;
        const colTotals = new Array(headers.length).fill(0);
        const hasHorizontalTotal = !headers.includes('Count'); // Summary 7-day doesn't need row totals

        let html = `<table><thead><tr>`;
        headers.forEach(h => html += `<th>${h}</th>`);
        if(hasHorizontalTotal) html += `<th style="background: var(--total-col-blue)">TOTAL</th>`;
        html += `</tr></thead><tbody>`;

        rows.forEach(r => {
            let rowSum = 0;
            html += `<tr>`;
            r.forEach((cell, idx) => {
                html += `<td>${cell}</td>`;
                if(idx > 0) {
                    colTotals[idx] += (Number(cell) || 0);
                    rowSum += (Number(cell) || 0);
                }
            });
            if(hasHorizontalTotal) html += `<td class="total-col">${rowSum}</td>`;
            html += `</tr>`;
        });

        // Footer Row
        html += `<tr class="total-row"><td>TOTAL</td>`;
        for(let i=1; i < colTotals.length; i++) html += `<td>${colTotals[i]}</td>`;
        if(hasHorizontalTotal) html += `<td></td>`; // The bottom-right empty cell
        html += `</tr></tbody></table>`;

        container.innerHTML = html;
    }

    function setupIndividualTabs(data) {
        const tabContainer = document.getElementById('tabContainer');
        const viewContainer = document.getElementById('individual-view-container');
        const modalities = [...new Set(data.map(d => d['Modality']))].sort();

        ORDERED_NAMES.forEach(name => {
            const btn = document.createElement('div');
            btn.className = 'tab-btn dyn-tab';
            btn.innerText = name;
            const tabId = `tab-view-${name.replace('.','')}`;
            btn.onclick = (e) => showTab(tabId, e.target);
            tabContainer.appendChild(btn);

            const view = document.createElement('div');
            view.id = tabId;
            view.className = 'tab-content hidden';

            const s1 = data.filter(d => d.rep1Name === name);
            const s2 = data.filter(d => d.rep2Name === name);
            const sCombined = data.filter(d => d.rep1Name === name || d.rep2Name === name);

            const generateSections = (title, subset, color) => {
                const titleEl = document.createElement('h3');
                titleEl.className = 'section-title';
                titleEl.style.borderColor = color;
                titleEl.innerText = title;
                view.appendChild(titleEl);

                const wrapper = document.createElement('div');
                wrapper.className = 'table-wrapper';
                view.appendChild(wrapper);

                if(subset.length === 0) {
                    wrapper.innerHTML = "<p style='padding:10px'>No data recorded.</p>";
                    return;
                }

                const months = [...new Set(subset.map(d => d.monthYear))].sort((a, b) => 
                    data.find(d => d.monthYear === a).sortKey - data.find(d => d.monthYear === b).sortKey
                );

                const rows = months.map(m => {
                    const r = [m];
                    modalities.forEach(mod => r.push(subset.filter(d => d.monthYear === m && d['Modality'] === mod).length));
                    return r;
                });

                renderTable(wrapper, ['Month', ...modalities], rows);
            };

            generateSections(`1. Reports as 'Reported By' (Primary)`, s1, 'var(--accent-blue)');
            generateSections(`2. Reports as 'Reported By 2' (Secondary)`, s2, 'var(--accent-green)');
            generateSections(`3. Total Studies (Primary + Secondary Combined)`, sCombined, 'var(--accent-purple)');

            viewContainer.appendChild(view);
        });
    }

    function showTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.remove('hidden');
        element.classList.add('active');
    }
</script>
</body>
</html>
